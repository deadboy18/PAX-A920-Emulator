<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAX A920 GHL Terminal Emulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#12121f;min-height:100vh;color:#333}
.app{display:grid;grid-template-columns:210px 1fr 250px;gap:14px;max-width:920px;margin:12px auto;padding:10px}

/* === PANELS === */
.panel{background:#1e1e34;border-radius:10px;padding:10px;border:1px solid #2a2a48}
.pt{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#6a6a8a;margin-bottom:6px}
.cfg-r{display:flex;justify-content:space-between;padding:2px 0;font-size:10px;color:#8a8aaa}
.cfg-v{font-family:Consolas,monospace;color:#cce;font-size:9px}
.com-s{display:flex;align-items:center;gap:5px;background:#14142a;border-radius:5px;padding:5px 8px;margin-bottom:4px}
.com-d{width:6px;height:6px;border-radius:50%;background:#c0392b;flex-shrink:0}
.com-d.on{background:#27ae60}
.com-l{font-size:10px;color:#c66}
.com-l.on{color:#6c6}
select{background:#14142a;border:1px solid #333;border-radius:4px;padding:4px;color:#cce;font-size:10px;width:100%;font-family:Consolas,monospace}
.btn-c{width:100%;padding:5px;border:none;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;margin-top:3px;background:#2980b9;color:#fff}
.btn-c.stop{background:#c0392b}
.btn-c:hover{filter:brightness(1.1)}
.chk{display:flex;align-items:center;gap:4px;font-size:9px;color:#8a8aaa;padding:1px 0}
.chk input{accent-color:#2980b9;width:12px;height:12px}
.cl{max-height:300px;overflow-y:auto;scrollbar-width:thin}
.ci{display:flex;align-items:center;gap:5px;padding:4px 5px;border:1px solid #2a2a48;border-radius:5px;margin-bottom:2px;cursor:pointer;transition:all .1s}
.ci:hover{background:#252548}
.ci.s{background:#1a2a48;border-color:#4a90d9}
.cc{width:22px;height:14px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;color:#fff;flex-shrink:0}
.cn{font-size:9px;font-weight:600;color:#cce}
.cp{font-size:7px;color:#6a6a8a;font-family:Consolas,monospace}
.cb{font-size:7px;color:#5a5a7a}
.cg{font-size:6px;font-weight:600;padding:1px 3px;border-radius:2px}
.cg.ok{background:#1a3a2a;color:#4ae68a}
.cg.fl{background:#3a1a1a;color:#e64a4a}
.sb{display:flex;flex-direction:column;gap:2px}
.si{padding:5px 8px;border:1px solid #2a2a48;border-radius:5px;background:#1e1e34;color:#cce;font-size:10px;cursor:pointer;text-align:left;transition:all .1s}
.si:hover{background:#252548}
.si.sl{border-left:3px solid #4caf50}
.si.vo{border-left:3px solid #e67e22}
.si.se{border-left:3px solid #2980b9}
.si.re{border-left:3px solid #c0392b}
.rct{background:#fffde7;border-radius:5px;padding:6px;font-family:'Courier New',monospace;font-size:7px;line-height:1.4;color:#1a1a1a;white-space:pre;max-height:180px;overflow-y:auto;border:1px solid #e0d8a0}
.lb{background:#0a0a1a;border-radius:5px;padding:5px;max-height:160px;overflow-y:auto;font-family:Consolas,monospace;font-size:8px}
.le{padding:1px 0;border-bottom:1px solid #151530;word-break:break-all}
.le.tx{color:#4fc3f7}.le.rx{color:#69f0ae}.le.er{color:#ff8a80}.le.in{color:#ffd54f}

/* ═══════════════════════════════════════
   PAX A920 DEVICE IMAGE OVERLAY
   ═══════════════════════════════════════ */
.tc{display:flex;flex-direction:column;align-items:center;gap:6px}
.tl{font-size:8px;color:#5a5a7a;letter-spacing:.04em;text-transform:uppercase}
.pax-wrap{position:relative;width:430px}
.pax-wrap img{width:100%;height:auto;display:block;user-select:none;-webkit-user-drag:none;pointer-events:none}

.screen-overlay{
  position:absolute;
  left:14.53%;top:21.46%;width:57.79%;height:57.17%;
  display:flex;flex-direction:column;overflow:hidden;border-radius:2px;
}

/* Status bar — matches real device */
.bar{background:#263238;padding:2px 8px;display:flex;justify-content:space-between;align-items:center;font-size:9px;color:#fff;min-height:18px;flex-shrink:0}
.bar .r{display:flex;align-items:center;gap:3px;font-size:9px}

/* Screen */
.scr{flex:1;background:#fff;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Nav bar — matches real Android nav */
.nav{background:#1a1a1a;padding:6px 0;display:flex;justify-content:center;gap:50px;flex-shrink:0;align-items:center}
.nav svg{width:14px;height:14px;opacity:.7;transition:opacity .15s}
.nav svg:hover{opacity:1}

/* === HOME SCREEN COMPONENTS === */
.sh{display:flex;align-items:center;padding:5px 8px;border-bottom:1px solid #eee;flex-shrink:0;background:#fff}
.sh .bk{cursor:pointer;font-size:12px;color:#333;width:18px}
.sh .tt{font-size:11px;font-weight:700;flex:1;text-align:center;margin-right:18px}

/* UOB bar */
.uob-bar{text-align:center;padding:8px 0 6px;border-bottom:3px solid #e8500d;background:#fff}
.uob-bars{display:inline-block;vertical-align:middle;margin-right:3px}
.uob-bars span{display:inline-block;width:4px;height:22px;background:#cc0000;margin-right:2px;border-radius:1px}
.uob-text{font-size:22px;font-weight:800;color:#003399;font-family:Arial,sans-serif;vertical-align:middle;letter-spacing:-1px}

/* Banner */
.menu-banner{background:linear-gradient(135deg,#f5f0ea,#ede5dd);padding:14px 18px;display:flex;justify-content:space-between;align-items:center;min-height:70px;position:relative}
.visa-logo{font-size:17px;font-weight:900;color:#1a1f71;font-style:italic;font-family:'Segoe UI'}
.mc-logo{display:flex;align-items:center}
.mc-logo .c1{width:22px;height:22px;border-radius:50%;background:#eb001b;margin-right:-8px}
.mc-logo .c2{width:22px;height:22px;border-radius:50%;background:#f79e1b;opacity:.85}
.mc-label{font-size:8px;color:#333;margin-top:2px;text-align:center;font-weight:500}

/* SALE circle button */
.sale-cir{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);width:50px;height:50px;border-radius:50%;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;z-index:2;transition:transform .15s}
.sale-cir:hover{transform:translateX(-50%) scale(1.05)}
.sale-cir svg{width:22px;height:22px}
.sale-cir .sl{font-size:8px;font-weight:800;margin-top:1px;color:#333}

/* Main transactions card */
.mtx-card{margin:24px 10px 6px;background:#fff;border-radius:10px;padding:10px 8px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #eee}
.mtx-title{font-size:11px;font-weight:700;margin-bottom:8px;padding:0 4px}
.mtx-row{display:flex;justify-content:space-around}
.mi{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px;border-radius:6px;transition:background .1s}
.mi:hover{background:#f5f5f5}
.mi svg{width:30px;height:30px}
.mi .ml{font-size:8px;color:#555;font-weight:500}

/* Second row */
.mtx2{display:flex;justify-content:space-around;padding:8px 16px}
.mf{display:flex;justify-content:space-between;align-items:center;padding:4px 10px;font-size:8px;color:#999;margin-top:auto}
.mf .ms{font-weight:600;color:#333;cursor:pointer;font-size:9px}
.mm{text-align:right;padding:2px 12px;font-size:11px;color:#333;cursor:pointer;font-weight:600}
.mm-arr{font-weight:700;color:#333}

/* Enter Amount */
.ea{padding:10px;background:#f0f0f0;flex:1;display:flex;flex-direction:column}
.ea-l{font-size:12px;font-weight:700;margin-bottom:4px;color:#333}
.ea-box{background:#fff;border:1px solid #bbb;border-radius:3px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ea-c{font-size:13px;font-weight:700;color:#333}
.ea-v{font-size:17px;font-weight:700;color:#333;font-family:Consolas,monospace}
.kp{display:grid;grid-template-columns:repeat(3,1fr);flex:1}
.kb{background:#f5f5f5;border:none;border-right:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0;padding:8px 0;font-size:14px;color:#333;cursor:pointer;font-family:'Segoe UI',sans-serif;transition:background .06s}
.kb:nth-child(3n){border-right:none}
.kb:active{background:#e0e0e0}
.kb.bs{background:#fdd835;color:#666;font-size:12px}
.kb.cl{font-size:10px;color:#777}
.kok{background:#4caf50;color:#fff;border:none;padding:10px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.kok:hover{filter:brightness(1.05)}

/* Present Card */
.pc{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px;background:#f5f5f5;position:relative}
.pc-tmr{position:absolute;right:10px;top:3px;font-size:10px;color:#888;font-weight:600}
.pc-amt{font-size:17px;font-weight:700;margin:3px 0 2px;color:#333}
.pc-lbl{font-size:11px;color:#555;margin-bottom:6px}
.pc-methods{display:flex;gap:6px;margin-bottom:6px}
.pc-methods svg{width:34px;height:34px}
.pc-cam{background:#222;flex:1;width:100%;border-radius:4px;position:relative;display:flex;align-items:center;justify-content:center;min-height:60px}
.pc-cam .scanline{position:absolute;width:80%;height:2px;background:#e74c3c;top:50%}
.pc-cam .camicon{color:#fff;font-size:16px;position:absolute;top:6px;left:6px;opacity:.6}
.tap-z{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,.15);border:2px dashed rgba(255,255,255,.4);border-radius:8px;padding:8px 14px;text-align:center;cursor:pointer;z-index:5;transition:all .2s}
.tap-z:hover{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.7)}
.tap-z span{color:#fff;font-size:9px}
.showqr{background:#e91e63;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:9px;font-weight:600;cursor:pointer;margin-top:4px;display:flex;align-items:center;gap:3px}

/* Processing */
.pr{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;background:#888}
.pr-l{font-size:12px;color:#fff;margin-bottom:6px}
.pr-box{background:#0a2a5c;border-radius:8px;padding:14px 18px;text-align:center;color:#fff;width:85%}
.pr-uob{background:#fff;display:inline-block;padding:3px 6px;border-radius:3px;margin-bottom:6px}
.pr-t{font-size:12px;font-weight:700;margin-bottom:2px}
.pr-s{font-size:10px;margin-bottom:2px}
.pr-sub{font-size:9px;color:#8ab4e8}

/* Approved */
.ap{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px}
.ap-card{background:#fff;border-radius:6px;padding:10px;width:92%;box-shadow:0 1px 6px rgba(0,0,0,.08);display:flex;flex-direction:column;align-items:center;margin-bottom:4px}
.ap-chk{width:34px;height:34px;border-radius:50%;background:#4caf50;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.ap-chk svg{width:18px;height:18px;stroke:#fff;stroke-width:3;fill:none}
.ap-tl{font-size:11px;font-weight:600;color:#4caf50;border-bottom:2px solid #4caf50;padding-bottom:2px;margin-bottom:6px}
.ap-g{display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;width:100%;margin-bottom:6px}
.ap-g .l{font-size:7px;color:#999;font-weight:600}
.ap-g .v{font-size:9px;font-weight:700;color:#333}
.ap-tp{font-size:10px;font-weight:600;color:#4caf50}
.ap-am{font-size:18px;font-weight:700;margin:2px 0 4px}
.ap-ci{display:flex;align-items:center;gap:4px;font-size:8px;color:#666;background:#f5f5f5;padding:3px 6px;border-radius:3px;width:100%}
.btn-cc{background:#1a2744;color:#fff;border:none;padding:6px;font-size:9px;font-weight:700;width:92%;cursor:pointer;border-radius:3px;letter-spacing:.03em;margin-top:4px}
.btn-dn{background:#4caf50;color:#fff;border:none;padding:6px;font-size:9px;font-weight:600;width:92%;cursor:pointer;border-radius:3px;margin-top:2px}

/* Declined */
.dl{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:12px}
.dl-x{width:34px;height:34px;border-radius:50%;background:#e74c3c;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.dl-x svg{width:17px;height:17px;stroke:#fff;stroke-width:3;fill:none}

/* Print overlay */
.po{position:absolute;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:10}
.pom{background:#fff;border-radius:10px;padding:12px 18px;text-align:center;box-shadow:0 3px 12px rgba(0,0,0,.15)}
.pom svg{width:40px;height:40px;margin-bottom:3px}
.pom p{font-size:9px;color:#666}

/* VOID pw */
.vbg{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:10}
.vin{background:linear-gradient(155deg,#c8e6f8,#a8d8f0,#88cce8);border-radius:10px;padding:10px;width:90%;position:relative}
.vx{position:absolute;top:6px;left:8px;font-size:13px;color:#e74c3c;cursor:pointer;font-weight:700}
.vlk{width:36px;height:36px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;margin:0 auto 3px}
.vlk-i{font-size:15px;color:#fdd835}
.vtl{text-align:center;font-size:10px;font-weight:600;margin-bottom:3px}
.vip{width:100%;padding:5px;text-align:center;font-size:12px;letter-spacing:3px;border:none;border-radius:4px;background:rgba(255,255,255,.6);margin-bottom:4px;font-family:Consolas,monospace}
.vkp{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.vk{background:rgba(255,255,255,.35);border:1px solid rgba(0,40,80,.2);border-radius:5px;padding:5px 0;text-align:center;cursor:pointer;transition:background .06s}
.vk:active{background:rgba(255,255,255,.7)}
.vk .d{font-size:13px;font-weight:600;color:#333}
.vk .lt{font-size:5px;color:#555;margin-left:1px;text-transform:uppercase}
.vk.ok{background:rgba(76,175,80,.2)}.vk.ok .d{color:#4caf50;font-size:14px}
.vk.del{background:rgba(180,180,180,.3)}

/* Confirm */
.cf{flex:1;display:flex;flex-direction:column;background:#f0f0f0}
.cf-tl{text-align:center;font-size:12px;font-weight:700;padding:6px 0}
.cf-cd{background:linear-gradient(135deg,#6db3e8,#78c5d6,#88d4c0);border-radius:8px;padding:10px;margin:0 8px 6px;color:#fff}
.cf-pan{font-size:13px;font-weight:700;letter-spacing:1px;margin-bottom:3px}
.cf-det{display:flex;justify-content:space-between;font-size:8px;opacity:.85}
.cf-fs{flex:1;padding:0 8px}
.cf-r{display:flex;justify-content:space-between;align-items:center;padding:5px 5px;border-bottom:1px solid #ddd;background:#fff}
.cf-rl{font-size:8px;color:#999}.cf-rv{font-size:9px;font-weight:600}
.cf-ri{font-size:12px;color:#bbb}
.cf-btns{display:flex;margin-top:auto}
.cf-cn{flex:1;background:#e74c3c;color:#fff;border:none;padding:8px;font-size:10px;font-weight:700;cursor:pointer}
.cf-ok{flex:1;background:#4caf50;color:#fff;border:none;padding:8px;font-size:10px;font-weight:700;cursor:pointer}

/* Hotspot hover effect */
.screen-overlay .scr div[onclick]:hover{background:rgba(0,120,255,.08);transition:background .15s}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
<!-- LEFT -->
<div style="display:flex;flex-direction:column;gap:8px">
<div class="panel">
<div class="pt">Configuration</div>
<div class="com-s"><div class="com-d" id="cd"></div><span class="com-l" id="cl">Disconnected</span></div>
<select id="cp"><option>COM6</option><option>COM5</option><option>COM3</option></select>
<button class="btn-c" id="bc" onclick="tgC()">START LISTENING</button>
<div style="margin-top:6px">
<div class="cfg-r"><span>TID</span><span class="cfg-v" id="cTid">80014554</span></div>
<div class="cfg-r"><span>MID</span><span class="cfg-v" id="cMid">0000000202235</span></div>
<div class="cfg-r"><span>Batch</span><span class="cfg-v" id="cBat">000002</span></div>
<div class="cfg-r"><span>App</span><span class="cfg-v">UOB 01.00.38</span></div>
</div>
<div style="margin-top:3px">
<div class="chk"><input type="checkbox" id="xAuto"><label for="xAuto">Auto-respond</label></div>
<div class="chk"><input type="checkbox" id="xFw" checked><label for="xFw">v1.0.17+ fields</label></div>
    <div style="margin-top:10px"><button class="si" style="background:linear-gradient(135deg,#2d7d46,#1fa34a);width:100%" onclick="batCharging=!batCharging;this.textContent=batCharging?'🔌 Charging…':'🔋 On Battery';updateBatUI()">🔋 On Battery</button></div>
</div>
</div>
<div class="panel" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
<div class="pt">Card Deck</div>
<div class="cl" id="cdk"></div>
</div>
</div>

<!-- TERMINAL -->
<div class="tc">

/* === PAX A920 Terminal Audio (TTS + Beeps) === */
/* Uses Web Speech API for voice + Web Audio API for beep tones */
/* Beep frequencies/timing matched from actual PAX A920 recording */
let audioCtx=null;
let ttsVoice=null;
let audioUnlocked=false;

/* Preload TTS voices - some browsers need this */
function loadVoices(){
  if(!('speechSynthesis' in window))return;
  const voices=window.speechSynthesis.getVoices();
  if(voices.length>0){
    /* Prefer a female English voice for authentic PAX feel */
    ttsVoice=voices.find(v=>/en/i.test(v.lang)&&/female/i.test(v.name))
      ||voices.find(v=>/en[-_]US/i.test(v.lang))
      ||voices.find(v=>/en/i.test(v.lang))
      ||voices[0];
  }
}
if('speechSynthesis' in window){
  loadVoices();
  window.speechSynthesis.onvoiceschanged=loadVoices;
}

/* Unlock AudioContext on first user interaction (browser requirement) */
function unlockAudio(){
  if(audioUnlocked)return;
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==="suspended")audioCtx.resume();
    audioUnlocked=true;
  }catch(e){}
}
document.addEventListener("click",unlockAudio,{once:false});
document.addEventListener("touchstart",unlockAudio,{once:false});

function getAudioCtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended")audioCtx.resume();
  return audioCtx;
}

/* Single beep tone */
function playBeep(freq,dur,vol){
  try{
    const ctx=getAudioCtx();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.type="sine";
    osc.frequency.value=freq||1000;
    gain.gain.setValueAtTime(vol||0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+(dur||0.15));
    osc.connect(gain);gain.connect(ctx.destination);
    osc.start();osc.stop(ctx.currentTime+(dur||0.15)+0.05);
  }catch(e){console.log("Beep error:",e)}
}

let tapAudioBuf=null;

/* Decode WAV → AudioBuffer once, then reuse */
async function decodeTapSound(){
  try{
    const ctx=getAudioCtx();
    const bin=atob(TAP_WAV_B64);
    const buf=new ArrayBuffer(bin.length);
    const view=new Uint8Array(buf);
    for(let i=0;i<bin.length;i++) view[i]=bin.charCodeAt(i);
    tapAudioBuf=await ctx.decodeAudioData(buf);
  }catch(e){console.log("Tap decode error:",e)}
}

function playAndroidTap(){
  try{
    const ctx=getAudioCtx();
    if(!tapAudioBuf){decodeTapSound().then(()=>playAndroidTap());return}
    const src=ctx.createBufferSource();
    src.buffer=tapAudioBuf;
    src.connect(ctx.destination);
    src.start();
  }catch(e){console.log("AndroidTap error:",e)}
}

/* Haptic feedback — Android-style short vibration pulse on touch */
/* 12ms matches AOSP HapticFeedbackConstants.KEYBOARD_TAP */
function hapticTap(){
  try{if(navigator.vibrate)navigator.vibrate(12)}catch(e){}
}

/* Combined: sound + haptic for every UI tap */
function uiTap(){
  playAndroidTap();
  hapticTap();
}

/* TTS speak with selected voice */
function speakTTS(text){
  try{
    if(!('speechSynthesis' in window))return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.9;u.pitch=1.05;u.volume=0.9;u.lang="en-US";
    if(ttsVoice)u.voice=ttsVoice;
    window.speechSynthesis.speak(u);
  }catch(e){console.log("TTS error:",e)}
}

/* Sale button → Android tap then 1.4s later TTS "Please input amount" */
function playInputAmount(){
  uiTap();
  setTimeout(()=>speakTTS("Please input amount"),1400);
}

/* Amount OK → Android tap then TTS "Please use your card" then double-beep */
function playPresentCard(){
  uiTap();
  setTimeout(()=>{
    speakTTS("Please use your card");
    /* Double beep after speech (~2s for speech to finish) */
    setTimeout(()=>{playBeep(1200,0.06,0.3);setTimeout(()=>playBeep(1200,0.06,0.3),250)},2000);
  },1400);
}

function playApproved(){playBeep(800,0.15,0.3);setTimeout(()=>playBeep(1200,0.2,0.3),200)}

function rAP(){if(!tx)return"";const c=C[sc],t=tx.tn||"SALE",neg=t==="VOID"?"-":"";return`<div class="sh"><span class="bk" onclick="gM()">←</span><span class="tt">${t}</span></div><div class="ap"><div class="ap-card"><div class="ap-chk"><svg viewBox="0 0 24 24"><polyline points="4,12 10,18 20,6"/></svg></div><div class="ap-tl">Transaction Approved</div><div class="ap-g"><div><div class="l">DATE</div><div class="v">${new Date().toLocaleDateString("en-GB")}</div></div><div><div class="l">TIME</div><div class="v">${new Date().toLocaleTimeString("en-GB")}</div></div><div><div class="l">INVOICE</div><div class="v">${String(iv).padStart(6,"0")}</div></div><div><div class="l">APPR CODE</div><div class="v">${tx.au||""}</div></div></div><div class="ap-tp">${t}</div><div class="ap-am">MYR ${neg}${tx.ad}</div><div class="ap-ci"><span style="font-weight:700">${c.br}</span><span>${c.pin?"Chip":"Contactless"}</span><span style="font-family:Consolas">${fp(c.p)}</span></div></div><button class="btn-cc">CUSTOMER COPY</button><button class="btn-dn" onclick="gM()">DONE</button></div>`}

function rD(){return`<div class="sh"><span class="bk" onclick="gM()">←</span><span class="tt">SALE</span></div><div class="dl"><div class="dl-x"><svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></div><div style="font-size:12px;font-weight:700;color:#e74c3c;margin:3px 0">Transaction Declined</div><div style="font-size:10px;color:#666">Error: ${tx?.ec||"??"}</div><div style="font-size:9px;color:#999">${ER[tx?.ec]||"Declined"}</div><button class="btn-dn" style="margin-top:10px;width:75%" onclick="gM()">OK</button></div>`}

function rPR(){return rAP()+`<div class="po"><div class="pom"><svg viewBox="0 0 60 60"><rect x="12" y="4" width="36" height="14" rx="2" fill="none" stroke="#42a5f5" stroke-width="2"/><rect x="6" y="18" width="48" height="20" rx="3" fill="none" stroke="#42a5f5" stroke-width="2"/><circle cx="14" cy="28" r="2.5" fill="#ef5350"/><rect x="16" y="38" width="28" height="14" rx="2" fill="none" stroke="#42a5f5" stroke-width="1.5"/><line x1="20" y1="44" x2="40" y2="44" stroke="#90caf9" stroke-width="1.5"/><line x1="20" y1="48" x2="34" y2="48" stroke="#90caf9" stroke-width="1.5"/></svg><p>Printing...</p></div></div>`}

function rVP(){return`<div style="flex:1;position:relative"><div class="vbg"><div class="vin"><div class="vx" onclick="gM()">✕</div><div class="vlk"><div class="vlk-i">🔒</div></div><div class="vtl">VOID</div><input class="vip" id="vI" type="password" placeholder="Input 1 - 6 digit password" readonly><div class="vkp">${["1 QZ","2 ABC","3 DEF","4 GHI","5 JKL","6 MNO","7 PRS","8 TUV","9 WXY"].map(k=>{const[d,...l]=k.split(" ");return`<div class="vk" onclick="vK('${d}')"><span class="d">${d}</span><span class="lt">${l.join(" ")}</span></div>`}).join("")}<div class="vk del" onclick="vD()"><span class="d">⌫</span></div><div class="vk" onclick="vK('0')"><span class="d">0</span></div><div class="vk ok" onclick="vS()"><span class="d">✓</span></div></div></div></div></div>`}

function rVC(){const c=C[sc];return`<div class="sh"><span class="bk" onclick="gM()">←</span><span class="tt">VOID</span></div><div class="cf"><div class="cf-tl">Confirm</div><div class="cf-cd"><div class="cf-pan">${fp(c.p)}</div><div class="cf-det"><span>XX/XX</span><span>◆${c.br}</span></div></div><div class="cf-fs"><div class="cf-r"><div><div class="cf-rl">Transaction</div><div class="cf-rv">SALE</div></div><span class="cf-ri">▤</span></div><div class="cf-r"><div><div class="cf-rl">Amount</div><div class="cf-rv">MYR ${tx?tx.ad:"0.01"}</div></div><span class="cf-ri">$</span></div><div class="cf-r"><div><div class="cf-rl">Invoice</div><div class="cf-rv">${String(iv).padStart(6,"0")}</div></div><span class="cf-ri">📋</span></div><div class="cf-r"><div><div class="cf-rl">Date/Time</div><div class="cf-rv">${new Date().toLocaleString("en-GB")}</div></div><span class="cf-ri">📅</span></div></div><div class="cf-btns"><button class="cf-cn" onclick="gM()">CANCEL</button><button class="cf-ok" onclick="cV()">OK</button></div></div>`}

function gM(){hapticTap();scrHist=[];st="menu";tx=null;W()}
function navBack(){hapticTap();if(scrHist.length>0){st=scrHist.pop();W()}else{gM()}}
function navHome(){hapticTap();gM()}
function pushSt(s){if(s&&s!==st)scrHist.push(s)}
function startS(){hapticTap();ar=0;tx={cmd:"020",ac:0,ad:"0.00",tn:"SALE",cs:"99"};st="amt";W();playInputAmount()}
function pN(n){uiTap();if(ar>99999999)return;ar=ar*10+n;tx.ac=ar;tx.ad=(ar/100).toFixed(2);W()}
function pC(){uiTap();ar=0;tx.ac=0;tx.ad="0.00";W()}
function pB(){uiTap();ar=Math.floor(ar/10);tx.ac=ar;tx.ad=(ar/100).toFixed(2);W()}
function cA(){if(ar<=0)return;iv++;tx.iv=iv;tm=58;st="pres";W();sT();playPresentCard()}
function sT(){clearInterval(ti);ti=setInterval(()=>{tm--;const e=document.getElementById("pT");if(e)e.textContent=tm+" s";if(tm<=0){clearInterval(ti);cT()}},1e3)}
function tC(){clearInterval(ti);hapticTap();playCardBeep();const c=C[sc];lg(`Card: ${c.br} ····${c.p.slice(-4)} (${c.b})`,"in");st="cproc";W();setTimeout(()=>{if(c.r!=="00"){st="bproc";W();setTimeout(()=>{tx.ec=c.r;lg("DECLINED "+c.r,"er");st="decl";W();playDeclined()},2e3);return}st="bproc";W();setTimeout(()=>{const e=document.getElementById("pSub");if(e)e.textContent="Receiving Data......59s"},1500);setTimeout(()=>{sn++;tx.au=Math.random().toString(36).substring(2,8).toUpperCase();tx.ec="00";tx.sn=sn;lg("APPROVED auth="+tx.au,"rx");st="appr";W();sR();playApproved();setTimeout(()=>{st="print";W();setTimeout(()=>{st="appr";W()},2e3)},1e3)},2e3+Math.random()*2e3)},1200)}
function cT(){clearInterval(ti);tx=tx||{};tx.ec="CT";lg("Cancelled (CT)","er");st="decl";W()}
function startV(){hapticTap();vp="";st="vpw";W()}
function vK(k){uiTap();if(vp.length<6){vp+=k;const e=document.getElementById("vI");if(e)e.value="●".repeat(vp.length)}}
function vD(){uiTap();vp=vp.slice(0,-1);const e=document.getElementById("vI");if(e)e.value="●".repeat(vp.length)}
function vS(){uiTap();if(vp==="0000"||vp==="000000"){lg("VOID pw OK","in");tx={cmd:"022",ac:1,ad:"0.01",tn:"VOID",cs:"99",iv:iv};st="vconf";W()}else{lg("Wrong pw","er");vp="";const e=document.getElementById("vI");if(e)e.value=""}}
function cV(){st="bproc";tx.tn="VOID";W();setTimeout(()=>{sn++;tx.au=Math.random().toString(36).substring(2,8).toUpperCase();tx.ec="00";lg("VOID OK auth="+tx.au,"rx");st="appr";W();sR();setTimeout(()=>{st="print";W();setTimeout(()=>{st="appr";W()},2e3)},1e3)},3e3)}
function xSale(){lg("POS→ Sale RM 0.01","tx");ar=1;tx={cmd:"020",ac:1,ad:"0.01",tn:"SALE",cs:"99"};iv++;tx.iv=iv;tm=58;st="pres";W();sT();playPresentCard()}
function xVoid(){lg("POS→ Void","tx");tx={cmd:"022",ac:1,ad:"0.01",tn:"VOID",cs:"99",iv:iv};st="vconf";W()}
function xSettle(){lg("POS→ Settlement","tx");tx={cmd:"050",ac:0,ad:"0.00",tn:"SETTLEMENT",cs:"99"};st="bproc";W();setTimeout(()=>{bt++;sn++;tx.au="";tx.ec="00";lg("Settled batch "+(bt-1),"in");document.getElementById("cBat").textContent=String(bt).padStart(6,"0");st="appr";tx.tn="SETTLEMENT";W()},3500)}
function xRefund(){lg("POS→ Refund","tx");ar=1;tx={cmd:"026",ac:1,ad:"0.01",tn:"REFUND",cs:"99"};iv++;tx.iv=iv;tm=58;st="pres";W();sT();playPresentCard()}
function sR(){const c=C[sc],d=new Date(),t=tx.tn||"SALE",neg=t==="VOID"?"-":"";document.getElementById("R").textContent=`  UNITED OVERSEAS BANK\n       Neo Hotel\n   68, Jalan Gurdware,\n George Town, 10300\n    Pulau Pinang\n${"═".repeat(30)}\nDATE:${d.toLocaleDateString("en-GB")}  TIME:${d.toLocaleTimeString("en-GB")}\nBATCH#:${String(bt).padStart(6,"0")}    TRACE#:${String(sn).padStart(6,"0")}\nMID:${document.getElementById("cMid").textContent}\n            TID:${document.getElementById("cTid").textContent}\n      ${t==="VOID"?"VOID SALE":t}\n        ${c.br}\n   ${fp(c.p)}\nCARD TYPE:      ${c.br.substring(0,6)}\nENTRY MODE:  ${c.pin?"CHIP":"CONTACTLESS"}\nAPPROVAL CODE:  ${tx.au||"------"}\nRESP CODE: 00\nTOTAL        MYR ${neg}${tx.ad}\n${"─".repeat(30)}\n   ${c.pin?"PIN VERIFIED OK":"NO PIN REQUIRED"}\n  *** MERCHANT COPY ***\n  PayHereDirect UOB 01.00.38`}
rc();W();
</script>
</body>
